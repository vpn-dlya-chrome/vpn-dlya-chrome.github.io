<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#162244"/>
      <stop offset="100%" stop-color="#080D1A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Chrome ring — 4 coloured arcs (90° each, CW from top) -->
  <path d="M 16 3 A 13 13 0 0 1 29 16" fill="none" stroke="#4285F4" stroke-width="4.5" stroke-linecap="butt"/>
  <path d="M 29 16 A 13 13 0 0 1 16 29" fill="none" stroke="#EA4335" stroke-width="4.5" stroke-linecap="butt"/>
  <path d="M 16 29 A 13 13 0 0 1 3 16"  fill="none" stroke="#FBBC04" stroke-width="4.5" stroke-linecap="butt"/>
  <path d="M 3 16  A 13 13 0 0 1 16 3"  fill="none" stroke="#34A853" stroke-width="4.5" stroke-linecap="butt"/>
  <!-- Inner cutout to form ring -->
  <circle cx="16" cy="16" r="7.5" fill="#0D1428"/>
  <!-- VPN shield in centre -->
  <path d="M16 8.5 L21 10.5 L21 15.5 Q21 19.5 16 21 Q11 19.5 11 15.5 L11 10.5 Z"
        fill="#4285F4" filter="url(#glow)" opacity="0.95"/>
  <!-- Lock body -->
  <rect x="13.8" y="15.5" width="4.4" height="3.5" rx="0.7" fill="white" opacity="0.97"/>
  <!-- Lock shackle -->
  <path d="M14.3 15.5 L14.3 14.0 Q14.3 12.3 16 12.3 Q17.7 12.3 17.7 14.0 L17.7 15.5"
        fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.97"/>
</svg>
